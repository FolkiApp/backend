name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint:check

      - name: Run tests with coverage
        run: npm run test:cov

      - name: Extract coverage for changed files
        id: coverage
        if: github.event_name == 'pull_request'
        run: |
          # Pega os arquivos alterados no PR
          CHANGED_FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path' | grep -E '\.(ts|js)$' | grep -v '.spec.ts' | grep -v '.test.ts')
          
          # Calcula cobertura apenas dos arquivos alterados
          TOTAL_LINES=0
          COVERED_LINES=0
          
          while IFS= read -r file; do
            # Remove 'src/' do início do caminho se existir
            CLEAN_FILE=$(echo "$file" | sed 's|^src/||')
            
            # Busca no coverage-summary.json
            FILE_COV=$(cat coverage/coverage-summary.json | jq -r ".\"src/$CLEAN_FILE\".lines // .\"$file\".lines // empty")
            
            if [ ! -z "$FILE_COV" ]; then
              TOTAL=$(echo $FILE_COV | jq -r '.total')
              COVERED=$(echo $FILE_COV | jq -r '.covered')
              TOTAL_LINES=$((TOTAL_LINES + TOTAL))
              COVERED_LINES=$((COVERED_LINES + COVERED))
            fi
          done <<< "$CHANGED_FILES"
          
          if [ $TOTAL_LINES -gt 0 ]; then
            COVERAGE=$(echo "scale=2; ($COVERED_LINES * 100) / $TOTAL_LINES" | bc)
          else
            COVERAGE=100
          fi
          
          echo "percentage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "total_lines=$TOTAL_LINES" >> $GITHUB_OUTPUT
          echo "covered_lines=$COVERED_LINES" >> $GITHUB_OUTPUT
          echo "Changed files coverage: $COVERAGE%"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = parseFloat('${{ steps.coverage.outputs.percentage }}');
            const totalLines = parseInt('${{ steps.coverage.outputs.total_lines }}');
            const coveredLines = parseInt('${{ steps.coverage.outputs.covered_lines }}');
            const emoji = coverage >= 90 ? '✅' : '⚠️';
            const status = coverage >= 90 ? 'Excelente!' : 'Atenção';
            
            const body = `## ${emoji} Cobertura de Testes - ${status}
            
            **Cobertura dos Arquivos Alterados:** ${coverage.toFixed(2)}%
            **Linhas Cobertas:** ${coveredLines}/${totalLines}
            
            ${coverage >= 90 ? '✨ Cobertura acima de 90%! Continue assim!' : '⚠️ Cobertura abaixo de 90%. Considere adicionar mais testes.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
